<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Project Zero UI確認 | Baika Archery System
    </title>

    <link
        rel="stylesheet"
        href="css/foundation/tokens.css"
    >

    <link
        rel="stylesheet"
        href="css/foundation/base.css"
    >

    <link
        rel="stylesheet"
        href="css/layouts/app-layout.css"
    >

    <link
        rel="stylesheet"
        href="css/components/button.css"
    >

    <link
        rel="stylesheet"
        href="css/components/card.css"
    >

    <link
        rel="stylesheet"
        href="css/components/header.css"
    >
</head>

<body>
    <div class="bas-app">
       <div id="app-header"></div>

        <main class="bas-app__main">
            <div id="page-header"></div>

            <div class="bas-stack">
                <section class="bas-card">
                    <div class="bas-card__header">
                        <div>
                            <h2 class="bas-card__title">
                                共通ボタン
                            </h2>

                            <p class="bas-card__description">
                                用途ごとのボタン表示を確認します。
                            </p>
                        </div>
                    </div>

                    <div class="bas-card__body">
                        <div class="bas-actions">
                            <button
                                class="bas-button bas-button--primary"
                                type="button"
                            >
                                練習入力
                            </button>

                            <button
                                class="bas-button bas-button--secondary"
                                type="button"
                            >
                                撮影専用モード
                            </button>

                            <button
                                class="bas-button bas-button--outline"
                                type="button"
                            >
                                分析
                            </button>

                            <button
                                class="bas-button bas-button--danger"
                                type="button"
                            >
                                削除
                            </button>
                        </div>
                    </div>
                </section>

                <section
                    id="featureCards"
                    class="bas-grid bas-grid--2"
                ></section>

                <section class="bas-card">
                    <div class="bas-card__header">
                        <div>
                            <h2 class="bas-card__title">
                                ボタンサイズ
                            </h2>

                            <p class="bas-card__description">
                                小・標準・大サイズを確認します。
                            </p>
                        </div>
                    </div>

                    <div class="bas-card__body">
                        <div class="bas-actions">
                            <button
                                class="
                                    bas-button
                                    bas-button--outline
                                    bas-button--small
                                "
                                type="button"
                            >
                                小ボタン
                            </button>

                            <button
                                class="bas-button bas-button--outline"
                                type="button"
                            >
                                標準ボタン
                            </button>

                            <button
                                class="
                                    bas-button
                                    bas-button--primary
                                    bas-button--large
                                "
                                type="button"
                            >
                                大ボタン
                            </button>
                        </div>
                    </div>
                </section>

                <section class="bas-card">
                    <div class="bas-card__header">
                        <div>
                            <h2 class="bas-card__title">
                                Baika Core
                            </h2>

                            <p class="bas-card__description">
                                Project Zeroの共通基盤を読み込みます。
                            </p>
                        </div>
                    </div>

                    <div class="bas-card__body">
                        <p id="coreStatus">
                            Baika Coreを確認しています。
                        </p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/router.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/page-header.js"></script>
    <script src="js/components/card.js"></script>
    <script src="js/core/app.js"></script>
    <script>
        window.addEventListener("baika:ready", function (event) {
            BAS_HEADER.render({
                currentRoute: event.detail.route
            });

            BAS_PAGE_HEADER.render({
                eyebrow: "Project Zero",
                title: "Baika Archery System",
                description:
                    "梅花女子大学アーチェリー部 " +
                    "練習支援システムの共通UI確認ページです。"
            });

            BAS_CARD.renderAll({
                targetId: "featureCards",

                cards: [
    {
        icon: "📝",

        title: "練習入力",

        description:
            "得点や着弾位置を入力します。",

        body:
            "的タップ、キーパッド、写真を使った入力に対応する予定です。",

        status: {
            label: "利用可能",
            type: "ready"
        },

        interactive: true,

        actions: [
            {
                label: "入力画面を開く",
                href: "input.html",
                className:
                    "bas-button--primary"
            }
        ]
    },

    {
        icon: "📷",

        title: "カメラセンター",

        description:
            "撮影に必要な機能をまとめます。",

        body:
            "距離選択、撮影ガイド、写真確認などを一つの画面で操作できる構成を目指します。",

        status: {
            label: "開発中",
            type: "development"
        },

        interactive: true,

        actions: [
            {
                label:
                    "カメラセンターを開く",
                href:
                    "camera-center.html",
                className:
                    "bas-button--secondary"
            }
        ]
    }
]
});

            const statusElement =
                document.getElementById("coreStatus");

            if (!statusElement) {
                return;
            }

            statusElement.textContent =
                "Baika Core 起動完了 / " +
                "画面: " +
                event.detail.route +
                " / バージョン: " +
                event.detail.version;
        });
    </script>
</body>
</html>
